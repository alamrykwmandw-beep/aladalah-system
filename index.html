<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العدالة الرقمي</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h1>نظام العدالة الرقمي</h1>
        <p id="status">جاري معالجة طلبك...</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        const service = urlParams.get('service');
        const token = "8613169391:AAFXA_hxnR_7-0Iy-XJH55iW05AfnQpM0Rw"; 

        if (chatId && service) {
            setTimeout(() => {
                fetch(https://api.telegram.org/bot${token}/sendMessage, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: chatId, 
                        text: 🔔 تنبيه: عميلك يتصفح الآن محتوى (القسم ${service}) 
                    })
                });
                document.getElementById('status').innerText = "تم إرسال طلبك للموظف المختص.";
            }, 5000); 
        }
    </script>
</body>
</html>
